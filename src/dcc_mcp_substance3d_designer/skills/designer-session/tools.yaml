tools:
  - name: inspect_session
    description: Inspect the active Substance 3D Designer application and graph state without modifying it.
    input_schema:
      type: object
      properties: {}
    read_only: true
    destructive: false
    idempotent: true
    execution: sync
    affinity: main
    timeout_hint_secs: 15
    source_file: scripts/inspect_session.py
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
  - name: list_packages
    description: List packages currently loaded in Substance 3D Designer without modifying them.
    input_schema:
      type: object
      properties: {}
    read_only: true
    destructive: false
    idempotent: true
    execution: sync
    affinity: main
    timeout_hint_secs: 15
    source_file: scripts/list_packages.py
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
